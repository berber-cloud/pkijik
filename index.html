<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радужный градиент | Современный стиль</title>
    <style>
        /* Сброс отступов и базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Фон с вертикальной "полосой" перелива */
            background: linear-gradient( 
                180deg, 
                #ff0066, #ff6600, #ffcc00, 
                #33cc33, #3399ff, #6633cc, #ff33cc
            );
            background-size: 100% 400%;  /* Растягиваем по вертикали в 4 раза */
            
            /* Очень медленное движение сверху вниз */
            animation: verticalFlow 20s linear infinite;
        }

        /* "Окно" для главного заголовка */
        .title-window {
            background: rgba(255, 255, 255, 0.15);  /* Полупрозрачный белый */
            backdrop-filter: blur(8px);              /* Эффект стекла (размытие фона) */
            -webkit-backdrop-filter: blur(8px);
            
            border-radius: 60px;                     /* Сильное скругление углов */
            padding: 40px 80px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2),
                        0 0 0 1px rgba(255, 255, 255, 0.3) inset;  /* Лёгкая внутренняя обводка */
            
            border: 1px solid rgba(255, 255, 255, 0.4);
            max-width: 90vw;                          /* Ограничение по ширине */
        }

        /* Контейнер для текста внутри окна */
        .content {
            text-align: center;
        }

        /* Главный текст — современный шрифт со скруглениями */
        .main-text {
            /* Современный геометрический шрифт */
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 
                         'Helvetica Neue', sans-serif;
            font-weight: 800;
            
            font-size: clamp(2.5rem, 12vw, 6rem);
            
            /* Делаем буквы визуально более мягкими, скруглёнными */
            letter-spacing: -0.02em;                   /* Лёгкая разреженность */
            
            /* Градиентный текст для красоты (можно заменить на жёлтый) */
            background: linear-gradient(135deg, #FFE77A, #FFD700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;                         /* Прозрачный, виден градиент */
            
            /* Тень для объёма */
            text-shadow: 2px 4px 20px rgba(0, 0, 0, 0.3);
            
            line-height: 1.2;
            margin-bottom: 15px;
            
            /* Дополнительно: скруглённые концы у букв (металлика) */
            font-stretch: expanded;
        }

        /* Мелкий заголовок (чёрный) */
        .small-title {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            font-weight: 400;
            font-size: clamp(0.9rem, 3.5vw, 1.6rem);
            
            color: #000000;                             /* Чистый чёрный */
            
            background: rgba(255, 255, 255, 0.3);       /* Легкая подложка */
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            
            border-radius: 100px;                       /* Скруглённый фон */
            padding: 8px 24px;
            display: inline-block;                       /* Чтобы фон был по тексту */
            
            border: 1px solid rgba(0, 0, 0, 0.1);
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        /* Анимация вертикального движения градиента (полоса сверху вниз) */
        @keyframes verticalFlow {
            0% {
                background-position: 0% 0%;      /* Начало: верх градиента */
            }
            50% {
                background-position: 0% 50%;     /* Середина: центр градиента */
            }
            100% {
                background-position: 0% 100%;     /* Конец: низ градиента */
            }
        }

        /* Адаптивность для мобильных */
        @media (max-width: 700px) {
            .title-window {
                padding: 30px 40px;
                border-radius: 40px;
            }
        }

        @media (max-width: 450px) {
            .title-window {
                padding: 25px 20px;
                border-radius: 30px;
            }
            
            .small-title {
                padding: 6px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Окно со скруглёнными углами -->
    <div class="title-window">
        <div class="content">
            <!-- Текст по центру (замени на свой) -->
            <h1 class="main-text">
                ПОШЕЛ<br>НАХУЙ
            </h1>
            
            <!-- Мелкий чёрный заголовок -->
            <div class="small-title">
                кто прочитал, тот гей
            </div>
        </div>
    </div>
</body>
</html>
