<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя страница</title>
    
    <!-- Подключаем мультяшные шрифты с Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Patrick+Hand&family=Comfortaa:wght@300..700&family=Rubik+Bubbles&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            
            /* Радужный фон с вертикальным движением */
            background: linear-gradient(180deg, 
                #ff0066, #ff6600, #ffcc00, 
                #33cc33, #3399ff, #6633cc, #ff33cc);
            background-size: 100% 700%;
            animation: rainbowFlow 25s linear infinite;
        }

        @keyframes rainbowFlow {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 0% 100%;
            }
        }

        .container {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .main-title {
            color: #FFD700; /* Яркий жёлтый */
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.2;
            
            /* Самый круглый мультяшный шрифт */
            font-family: 'Rubik Bubbles', 'Fredoka', 'Patrick Hand', 'Comfortaa', cursive, sans-serif;
            
            /* Белое непрозрачное окно */
            background-color: #ffffff;
            border-radius: 25px;
            padding: 30px 40px;
            margin: 0 auto 30px auto;
            max-width: 900px;
            
            /* Тень для объёма */
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.05);
            
            /* Мультяшная тень для текста */
            text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.1);
        }

        .bottom-title {
            color: #000000;
            font-size: 1.5rem;
            font-weight: 400;
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            
            /* Тот же мультяшный шрифт */
            font-family: 'Patrick Hand', 'Fredoka', 'Comfortaa', cursive, sans-serif;
            
            /* Белое непрозрачное окно */
            background-color: #ffffff;
            border-radius: 20px;
            padding: 18px 30px;
            margin: 0 auto;
            max-width: 600px;
            
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5rem;
                padding: 25px 30px;
                border-radius: 20px;
            }
            
            .bottom-title {
                font-size: 1.2rem;
                padding: 15px 25px;
                bottom: 30px;
                border-radius: 15px;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 2rem;
                padding: 20px 25px;
                border-radius: 15px;
            }
            
            .bottom-title {
                font-size: 1rem;
                padding: 12px 20px;
                bottom: 20px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">ПОШЕЛ НАХУЙ</h1>
        <h2 class="bottom-title">Кто прочитал, тот гей</h2>
    </div>
</body>
</html>
