<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя страница</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            
            /* Радужный фон с вертикальным движением */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, 
                #ff0066, #ff6600, #ffcc00, 
                #33cc33, #3399ff, #6633cc, #ff33cc);
            background-size: 100% 700%; /* Растягиваем на всю высоту градиента */
            animation: rainbowFlow 25s linear infinite; /* Медленное движение */
        }

        @keyframes rainbowFlow {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 0% 100%;
            }
        }

        .container {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .main-title {
            color: #000000;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            
            /* Белое непрозрачное окно */
            background-color: #ffffff;
            border-radius: 25px; /* Чуть больше скругление для современности */
            padding: 30px 40px;
            margin: 0 auto 30px auto;
            max-width: 900px;
            
            /* Лёгкая тень для объёма */
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            
            /* Белая рамка (опционально, можно убрать) */
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .bottom-title {
            color: #000000; /* Чёрный цвет как в примере, но можно изменить */
            font-size: 1.5rem;
            font-weight: 400;
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            
            /* Белое непрозрачное окно */
            background-color: #ffffff;
            border-radius: 20px;
            padding: 18px 30px;
            margin: 0 auto;
            max-width: 600px;
            
            /* Тень как в примере, но нейтральная */
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            
            /* Лёгкая обводка */
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5rem;
                padding: 25px 30px;
                border-radius: 20px;
            }
            
            .bottom-title {
                font-size: 1.2rem;
                padding: 15px 25px;
                bottom: 30px;
                border-radius: 15px;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 2rem;
                padding: 20px 25px;
                border-radius: 15px;
            }
            
            .bottom-title {
                font-size: 1rem;
                padding: 12px 20px;
                bottom: 20px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">ЗДЕСЬ БУДЕТ ГЛАВНЫЙ ЗАГОЛОВОК</h1>
        <h2 class="bottom-title">ЗДЕСЬ БУДЕТ НИЖНИЙ ЗАГОЛОВОК</h2>
    </div>
</body>
</html>
